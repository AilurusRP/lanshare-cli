name: lanshare_cli
description: A LAN-based IM app with a graphical interface (flutter) on mobile and a command-line interface on desktop. Transfer messages between your phone and computer. Supports Android, Linux and Windows. This repository is the desktop(CLI) component. 
version: 1.0.0
repository: https://github.com/AilurusRP/lanshare-cli
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  qr: ^3.0.2
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_static: ^1.1.3
  eventsource:
    git:
      url: https://github.com/AilurusRP/dart-eventsource.git
      ref: master
  shelf_eventsource:
    git:
      url: https://github.com/AilurusRP/dart-shelf_eventsource.git
      ref: master


dev_dependencies:
  http: ^1.4.0
  lints: ^5.0.0
  test: ^1.24.0
